name: Release

# Tag-driven publish: publishing a GitHub Release publishes that release's tag version to npm.
# The tag is the single source of truth for the version (see scripts/set-release-version.mjs) —
# `gh release create v0.1.0-alpha.1 --prerelease` publishes 0.1.0-alpha.1.
# Manual `workflow_dispatch` runs build + verify + a publish dry-run only; it never publishes.
on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for npm provenance (OIDC)

env:
  NODE_VERSION_FILE: .nvmrc

jobs:
  # 1) Build a prebuilt .node per launch target.
  build:
    name: build (${{ matrix.tag }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { tag: darwin-arm64, target: aarch64-apple-darwin, runner: macos-14 }
          # Cross-compiled on Apple Silicon (macos-14) — macos-13 (Intel) runners are scarce and
          # being deprecated. darwin arm↔x86 is tier-1; no verify job (can't load x64 on an arm64 runner).
          - { tag: darwin-x64, target: x86_64-apple-darwin, runner: macos-14 }
          - { tag: linux-x64-gnu, target: x86_64-unknown-linux-gnu, runner: ubuntu-24.04 }
          # Native arm64 runner; if unavailable, build via QEMU (see RELEASING.md).
          - { tag: linux-arm64-gnu, target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm }
          # linux-x64-musl is a fast-follow: cross-compiling musl with panic=unwind needs libgcc_s
          # that musl-gcc can't supply on a glibc host, and the native-musl (alpine) image ships a
          # node too old for @napi-rs/cli. Reserved as null in the loader's RESOLUTION_TABLE.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Provision Rust toolchain + target
        run: |
          rustup show
          rustup target add ${{ matrix.target }}
      - run: npm ci
      - name: napi build (${{ matrix.target }})
        run: npm -w @vellora/native run build:addon -- --target ${{ matrix.target }}
      - name: Upload prebuilt addon
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.tag }}
          path: packages/native/*.node
          if-no-files-found: error

  # 2) Prove a clean install loads the prebuilt addon with NO Rust toolchain/compiler.
  verify:
    name: verify clean install (${{ matrix.tag }})
    needs: build
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { tag: darwin-arm64, runner: macos-14 }
          # darwin-x64 is cross-compiled on macos-14; no Intel runner to load-test it on, so it has
          # no verify job (the cross-compile is tier-1 and trusted).
          - { tag: linux-x64-gnu, runner: ubuntu-24.04 }
          - { tag: linux-arm64-gnu, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: npm ci
      - name: Build TypeScript (tsc only — no Rust toolchain)
        run: npm run build:ts
      - uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.tag }}
          path: packages/native/
      - name: Render a PDF with no toolchain present
        # The loader resolves the local .node via its dev-path branch; assert the result is a PDF.
        run: |
          node -e "import('@vellora/native').then(async (m) => {
            const pdf = await m.render(new TextEncoder().encode('<p>ok</p>'));
            if (Buffer.from(pdf.slice(0,5)).toString() !== '%PDF-') { console.error('not a PDF'); process.exit(1); }
            console.log('clean-install render OK for ${{ matrix.tag }}');
          }).catch((e) => { console.error(e); process.exit(1); })"

  # 3) Version + publish with provenance — gated on every build & verify job passing.
  release:
    name: version + publish
    needs: [build, verify]
    runs-on: ubuntu-24.04
    env:
      # npm 11 requires an explicit dist-tag for prerelease versions. Keep alpha releases on
      # `latest` while the public install docs say `npm install vellora`.
      NPM_DIST_TAG: latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Provision Rust toolchain
        run: rustup show
      - uses: actions/download-artifact@v4
        with:
          pattern: bindings-*
          merge-multiple: true
          path: packages/native/
      - name: Move prebuilds into npm/* platform packages
        run: npm -w @vellora/native exec -- napi artifacts --output-dir . --npm-dir npm
      - name: Bundle license notices alongside each platform binary
        # Each per-platform package ships the addon, which statically links third-party crates and
        # embeds bundled fonts — so the attribution must travel in the same tarball (their files
        # arrays list these). The canonical copies live in packages/native/.
        run: |
          for d in packages/native/npm/*/; do
            cp packages/native/THIRD-PARTY-NOTICES.md packages/native/LICENSE-DejaVu.txt packages/native/LICENSE-Liberation.txt "$d"
          done
      - name: Set every published package to the release tag version
        if: ${{ github.event_name == 'release' }}
        env:
          # Passed via env (not inlined into the shell) to avoid command injection from the tag name;
          # set-release-version.mjs additionally rejects anything that isn't a semver version.
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node scripts/set-release-version.mjs "$RELEASE_TAG"
      - name: Build TypeScript
        run: npm run build:ts
      - name: Publish dry-run (always — validate packaging without uploading)
        # changeset publish has no --dry-run; pack each publishable package instead (no upload, no
        # auth). napi pre-publish --dry-run validates the per-platform package prep.
        run: |
          npm -w @vellora/native exec -- napi pre-publish -t npm --dry-run
          npm publish --dry-run --tag "$NPM_DIST_TAG" --workspace vellora --workspace @vellora/native --workspace @vellora/lint --workspace @vellora/cli --workspace @vellora/engine-chromium
      - name: Publish to npm with provenance
        if: ${{ github.event_name == 'release' }}
        # Provenance comes from NPM_CONFIG_PROVENANCE (below) — `changeset publish` has no
        # --provenance flag. napi pre-publish publishes the per-platform packages; changeset publish
        # publishes the fixed-version workspace packages (and skips any already on the registry).
        run: |
          npm -w @vellora/native exec -- napi pre-publish -t npm
          npx changeset publish --tag "$NPM_DIST_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
          # napi pre-publish shells out to `npm publish` for per-platform packages.
          NPM_CONFIG_TAG: ${{ env.NPM_DIST_TAG }}
      - name: Assert provenance is present on the published versions
        if: ${{ github.event_name == 'release' }}
        # The registry read API lags behind a publish, so retry before failing — otherwise this
        # false-negatives on a freshly published package that isn't queryable yet.
        run: |
          for pkg in vellora @vellora/native @vellora/lint @vellora/cli @vellora/engine-chromium; do
            echo "Checking provenance attestation for $pkg ..."
            for attempt in 1 2 3 4 5 6; do
              if npm view "$pkg" dist.attestations --json 2>/dev/null | grep -q provenance; then
                echo "  ok"; break
              fi
              if [ "$attempt" = 6 ]; then echo "::error::No provenance attestation found for $pkg"; exit 1; fi
              echo "  not visible yet (attempt $attempt); registry read lag — retrying in 15s"
              sleep 15
            done
          done
