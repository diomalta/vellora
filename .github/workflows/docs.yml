name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow one concurrent deployment; let a newer run cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: build docs
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install npm workspace
        run: npm ci

      - name: Build workspace packages
        # TypeDoc type-checks packages/vellora against the @vellora/native and @vellora/lint type
        # declarations, which only exist once each workspace is built. dist/ is gitignored, so a
        # clean CI checkout must build them first (tsc only — no Rust toolchain or .node needed).
        run: npm run build:ts

      - name: Generate API reference (TypeDoc)
        run: npm run docs:api

      - name: Build site (VitePress)
        # DocSearch credentials are optional: when absent the site falls back to local search.
        env:
          DOCSEARCH_APP_ID: ${{ secrets.DOCSEARCH_APP_ID }}
          DOCSEARCH_API_KEY: ${{ secrets.DOCSEARCH_API_KEY }}
          DOCSEARCH_INDEX_NAME: ${{ secrets.DOCSEARCH_INDEX_NAME }}
        run: npm run docs:build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    name: deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
