name: Bug report
description: Report a reproducible problem with vellora
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in the fields below so we can reproduce the issue.

        **Do not report security vulnerabilities here** — see [SECURITY.md](https://github.com/diomalta/vellora/blob/main/SECURITY.md) for private disclosure.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Exact steps to reproduce. Include a minimal HTML/CSS input and the data passed, if relevant.
      placeholder: |
        1. Call `renderPdf(html, data, options)` with the following input...
        2. ...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened, including any error message or stack trace.
    validations:
      required: true
  - type: input
    id: vellora-version
    attributes:
      label: vellora version
      description: The version of the `vellora` package (e.g. 0.1.0-alpha.0).
    validations:
      required: true
  - type: input
    id: os-arch
    attributes:
      label: OS and architecture
      description: e.g. macOS 14 arm64, Ubuntu 24.04 x64.
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
    validations:
      required: true
  - type: input
    id: rust-version
    attributes:
      label: Rust version
      description: Output of `rustc --version` (only if you build from source; otherwise write "prebuilt").
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help — logs, related issues, workarounds tried.
    validations:
      required: false
