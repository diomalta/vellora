name: Feature request
description: Suggest an idea or enhancement for vellora
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. vellora targets generated documents (invoices, receipts, boletos, notifications) with a strict, documented HTML/CSS subset — please keep that scope in mind.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? Why does the current behavior fall short?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've considered, and why they fall short.
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Examples, references, mockups, or anything else that helps explain the request.
    validations:
      required: false
