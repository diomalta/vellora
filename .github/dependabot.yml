version: 2
updates:
  # Rust crates — the napi-rs addon's risk lives largely in the transitive
  # crate graph (HTML/CSS/PDF engines), so this is load-bearing, not optional.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-dependencies:
        patterns:
          - "*"

  # npm workspaces — resolved from the root across all workspace packages.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns:
          - "*"

  # Keep the GitHub Actions used by CI current as well.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
